suite: Config Map
templates:
  - config/configmap.yaml
tests:
  - it: should render frontend parameters when explicitly set
    set:
      hoppscotch:
        frontend:
          baseUrl: https://example.com
          shortcodeBaseUrl: https://example.com/shortcode
          adminUrl: https://example.com/admin
          backendGqlUrl: https://example.com/api/graphql
          backendWsUrl: wss://example.com/api/graphql
          backendApiUrl: https://example.com/api
          appTosLink: https://example.com/tos
          appPrivacyPolicyLink: https://example.com/privacy
          enableSubpathBasedAccess: true
          proxyAppUrl: https://proxy.example.com
          proxyscotchAccessToken: proxy-token
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: metadata.name
          value: release-name-hoppscotch
      - equal:
          path: data.VITE_BASE_URL
          value: https://example.com
      - equal:
          path: data.VITE_SHORTCODE_BASE_URL
          value: https://example.com/shortcode
      - equal:
          path: data.VITE_ADMIN_URL
          value: https://example.com/admin
      - equal:
          path: data.VITE_BACKEND_GQL_URL
          value: https://example.com/api/graphql
      - equal:
          path: data.VITE_BACKEND_WS_URL
          value: wss://example.com/api/graphql
      - equal:
          path: data.VITE_BACKEND_API_URL
          value: https://example.com/api
      - equal:
          path: data.VITE_APP_TOS_LINK
          value: https://example.com/tos
      - equal:
          path: data.VITE_APP_PRIVACY_POLICY_LINK
          value: https://example.com/privacy
      - equal:
          path: data.ENABLE_SUBPATH_BASED_ACCESS
          value: "true"
      - equal:
          path: data.PROXY_APP_URL
          value: https://proxy.example.com
      - equal:
          path: data.VITE_PROXYSCOTCH_ACCESS_TOKEN
          value: proxy-token

  - it: should render backend parameters when explicitly set
    set:
      hoppscotch:
        backend:
          aioAlternatePort: 3000
          trustProxy: true
          whitelistedOrigins:
            - https://example.com
            - app://example.com
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: metadata.name
          value: release-name-hoppscotch
      - notExists:
          path: data.DATABASE_URL
      - equal:
          path: data.HOPP_AIO_ALTERNATE_PORT
          value: "3000"
      - equal:
          path: data.TRUST_PROXY
          value: "true"
      - equal:
          path: data.WHITELISTED_ORIGINS
          value: "https://example.com,app://example.com"

  - it: should render enterprise parameters when explicitly set
    set:
      hoppscotch:
        frontend:
          localProxyServerEnabled: true
          proxyAppUrl: https://proxy.example.com
        backend:
          horizontalScalingEnabled: true
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: data.LOCAL_PROXY_SERVER_ENABLE
          value: "true"
      - equal:
          path: data.PROXY_APP_URL
          value: https://proxy.example.com
      - equal:
          path: data.HORIZONTAL_SCALING
          value: "true"

  - it: should not render env vars that moved to the admin dashboard
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - notExists:
          path: data.MAILER_SMTP_ENABLE
      - notExists:
          path: data.MAILER_SMTP_HOST
      - notExists:
          path: data.RATE_LIMIT_TTL
      - notExists:
          path: data.RATE_LIMIT_MAX
      - notExists:
          path: data.TOKEN_SALT_COMPLEXITY
      - notExists:
          path: data.MAGIC_LINK_TOKEN_VALIDITY
      - notExists:
          path: data.ACCESS_TOKEN_VALIDITY
      - notExists:
          path: data.REFRESH_TOKEN_VALIDITY
      - notExists:
          path: data.ALLOW_SECURE_COOKIES
      - notExists:
          path: data.REDIRECT_URL
      - notExists:
          path: data.VITE_ALLOWED_AUTH_PROVIDERS
      - notExists:
          path: data.GOOGLE_CALLBACK_URL
      - notExists:
          path: data.GITHUB_CALLBACK_URL
      - notExists:
          path: data.MICROSOFT_CALLBACK_URL
      - notExists:
          path: data.SAML_CALLBACK_URL
      - notExists:
          path: data.OIDC_CALLBACK_URL
      - notExists:
          path: data.IS_GITHUB_ENTERPRISE_ENABLED
      - notExists:
          path: data.ALLOW_AUDIT_LOGS
      - notExists:
          path: data.CLICKHOUSE_HOST

  - it: should default trust proxy to false
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: data.TRUST_PROXY
          value: "false"

  - it: should generate backend whitelisted origins when deployment mode is aio and ingress is enabled
    set:
      deploymentMode: aio
      aio:
        subpathBasedAccess: true
        ingress:
          enabled: true
          hostname: example.com
          tls: true
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: data.WHITELISTED_ORIGINS
          value: https://example.com,app://example_com,http://app.example_com

  - it: should generate backend whitelisted origins when deployment mode is aio and ingress is not enabled
    set:
      deploymentMode: aio
      aio:
        subpathBasedAccess: true
        ingress:
          enabled: false
          hostname: example.com
          tls: true
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: data.WHITELISTED_ORIGINS
          value: ""

  - it: should generate backend whitelisted origins when deployment mode is distributed and ingress is enabled
    set:
      deploymentMode: distributed
      frontend:
        ingress:
          enabled: true
          hostname: frontend.example.com
          tls: true
      backend:
        ingress:
          enabled: true
          hostname: backend.example.com
          tls: true
      admin:
        ingress:
          enabled: true
          hostname: admin.example.com
          tls: true
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: ConfigMap
      - equal:
          path: data.WHITELISTED_ORIGINS
          # yamllint disable-line rule:line-length
          value: https://frontend.example.com,app://frontend_example_com,http://app.frontend_example_com,https://backend.example.com,https://admin.example.com

  - it: should generate frontend admin URL when deployment mode is aio and ingress is enabled
