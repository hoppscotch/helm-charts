suite: Frontend HTTPRoute
templates:
  - frontend/deployment.yaml
  - frontend/httproute.yaml
  - config/configmap.yaml
  - config/secret.yaml
tests:
  - it: should generate HTTPRoute when deployment mode is distributed and httpRoute is enabled
    template: frontend/httproute.yaml
    set:
      deploymentMode: distributed
      frontend:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: default
    asserts:
      - containsDocument:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
      - equal:
          path: metadata.name
          value: release-name-hoppscotch-frontend

  - it: should not generate HTTPRoute when deployment mode is distributed and httpRoute is disabled
    template: frontend/httproute.yaml
    set:
      deploymentMode: distributed
      frontend:
        httpRoute:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate HTTPRoute when deployment mode is not distributed
    template: frontend/httproute.yaml
    set:
      deploymentMode: aio
      frontend:
        httpRoute:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should set parentRefs when specified
    template: frontend/httproute.yaml
    set:
      deploymentMode: distributed
      frontend:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: default
              sectionName: https
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: default
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: should set hostnames when specified
    template: frontend/httproute.yaml
    set:
      deploymentMode: distributed
      frontend:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          hostnames:
            - frontend.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: frontend.example.com

  - it: should set backendRefs to frontend service
    template: frontend/httproute.yaml
    set:
      deploymentMode: distributed
      frontend:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
        service:
          ports:
            http: 3000
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: release-name-hoppscotch-frontend
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3000

  - it: should include annotations when specified
    template: frontend/httproute.yaml
    set:
      deploymentMode: distributed
      frontend:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          annotations:
            example.com/custom: "true"
    asserts:
      - equal:
          path: metadata.annotations["example.com/custom"]
          value: "true"
