suite: Secret
templates:
  - config/secret.yaml
tests:
  - it: should not create secret when existing secret is provided
    set:
      existingSecret: "my-existing-secret"
    asserts:
      - hasDocuments:
          count: 0

  - it: should set data encryption key
    set:
      hoppscotch:
        backend:
          dataEncryptionKey: hoppscotch-data-encryption-key
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: Secret
      - equal:
          path: data.DATA_ENCRYPTION_KEY
          value: hoppscotch-data-encryption-key
          decodeBase64: true

  - it: should generate data encryption key when empty
    set:
      hoppscotch:
        backend:
          dataEncryptionKey: ""
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: Secret
      - matchRegex:
          path: data.DATA_ENCRYPTION_KEY
          pattern: "^[a-zA-Z0-9]{32}$"
          decodeBase64: true

  - it: should set data encryption key with existing secret
    set:
      hoppscotch:
        backend:
          dataEncryptionKey: ""
    kubernetesProvider:
      scheme:
        v1/Secret:
          gvr:
            version: v1
            resource: secrets
          namespaced: true
      objects:
        - apiVersion: v1
          kind: Secret
          metadata:
            name: release-name-hoppscotch
            namespace: NAMESPACE
          data:
            # echo -n hoppscotch-data-encryption-key | base64
            DATA_ENCRYPTION_KEY: aG9wcHNjb3RjaC1kYXRhLWVuY3J5cHRpb24ta2V5
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: Secret
      - equal:
          path: data.DATA_ENCRYPTION_KEY
          value: hoppscotch-data-encryption-key
          decodeBase64: true

  - it: should set enterprise license key
    set:
      hoppscotch:
        backend:
          enterpriseLicenseKey: hoppscotch-enterprise-license-key
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: Secret
      - equal:
          path: data.ENTERPRISE_LICENSE_KEY
          value: hoppscotch-enterprise-license-key
          decodeBase64: true

  - it: should not set secrets that moved to the admin dashboard
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: Secret
      - notExists:
          path: data.JWT_SECRET
      - notExists:
          path: data.SESSION_SECRET
      - notExists:
          path: data.MAILER_SMTP_URL
      - notExists:
          path: data.MAILER_SMTP_USER
      - notExists:
          path: data.MAILER_SMTP_PASSWORD
      - notExists:
          path: data.GOOGLE_CLIENT_ID
      - notExists:
          path: data.GITHUB_CLIENT_ID
      - notExists:
          path: data.MICROSOFT_CLIENT_ID
      - notExists:
          path: data.OIDC_CLIENT_ID
      - notExists:
          path: data.OIDC_CLIENT_SECRET
      - notExists:
          path: data.SAML_CERT
      - notExists:
          path: data.CLICKHOUSE_USER
      - notExists:
          path: data.CLICKHOUSE_PASSWORD

  - it: should not set redis url when horizontal scaling is disabled
    set:
      hoppscotch:
        backend:
          horizontalScalingEnabled: false
    asserts:
      - containsDocument:
          apiVersion: v1
          kind: Secret
      - notExists:
          path: data.REDIS_URL
