suite: Distributed Routes
templates:
  - frontend/route.yaml
  - backend/route.yaml
  - admin/route.yaml
  - config/configmap.yaml
  - config/secret.yaml
tests:
  - it: should generate frontend Route in distributed mode when enabled
    template: frontend/route.yaml
    capabilities:
      apiVersions:
        - route.openshift.io/v1
    set:
      deploymentMode: distributed
      frontend:
        route:
          enabled: true
    asserts:
      - containsDocument:
          apiVersion: route.openshift.io/v1
          kind: Route
      - equal:
          path: metadata.name
          value: release-name-hoppscotch-frontend
      - equal:
          path: spec.to.name
          value: release-name-hoppscotch-frontend

  - it: should generate backend Route in distributed mode when enabled
    template: backend/route.yaml
    capabilities:
      apiVersions:
        - route.openshift.io/v1
    set:
      deploymentMode: distributed
      backend:
        route:
          enabled: true
    asserts:
      - containsDocument:
          apiVersion: route.openshift.io/v1
          kind: Route
      - equal:
          path: metadata.name
          value: release-name-hoppscotch-backend
      - equal:
          path: spec.to.name
          value: release-name-hoppscotch-backend

  - it: should generate admin Route in distributed mode when enabled
    template: admin/route.yaml
    capabilities:
      apiVersions:
        - route.openshift.io/v1
    set:
      deploymentMode: distributed
      admin:
        route:
          enabled: true
    asserts:
      - containsDocument:
          apiVersion: route.openshift.io/v1
          kind: Route
      - equal:
          path: metadata.name
          value: release-name-hoppscotch-admin
      - equal:
          path: spec.to.name
          value: release-name-hoppscotch-admin

  - it: should not generate distributed Routes in aio mode
    templates:
      - frontend/route.yaml
      - backend/route.yaml
      - admin/route.yaml
    set:
      deploymentMode: aio
      frontend:
        route:
          enabled: true
      backend:
        route:
          enabled: true
      admin:
        route:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate distributed Routes when the Route API is unavailable
    templates:
      - frontend/route.yaml
      - backend/route.yaml
      - admin/route.yaml
    capabilities:
      apiVersions: []
    set:
      deploymentMode: distributed
      frontend:
        route:
          enabled: true
      backend:
        route:
          enabled: true
      admin:
        route:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
