suite: AIO Route
templates:
  - aio/route.yaml
  - config/configmap.yaml
  - config/secret.yaml
tests:
  - it: should generate Route when deployment mode is aio and route is enabled
    template: aio/route.yaml
    set:
      deploymentMode: aio
      aio:
        route:
          enabled: true
    asserts:
      - containsDocument:
          apiVersion: route.openshift.io/v1
          kind: Route
      - equal:
          path: metadata.name
          value: release-name-hoppscotch
      - equal:
          path: spec.to.name
          value: release-name-hoppscotch
      - equal:
          path: spec.port.targetPort
          value: http
      - equal:
          path: spec.tls.termination
          value: edge

  - it: should not generate Route when route is disabled
    template: aio/route.yaml
    set:
      deploymentMode: aio
      aio:
        route:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate Route when deployment mode is not aio
    template: aio/route.yaml
    set:
      deploymentMode: distributed
      aio:
        route:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should set host, path and disable TLS when configured
    template: aio/route.yaml
    set:
      deploymentMode: aio
      aio:
        route:
          enabled: true
          host: hoppscotch.apps.example.com
          path: /
          targetPort: http-frontend
          tls:
            enabled: false
    asserts:
      - equal:
          path: spec.host
          value: hoppscotch.apps.example.com
      - equal:
          path: spec.path
          value: /
      - equal:
          path: spec.port.targetPort
          value: http-frontend
      - notExists:
          path: spec.tls
