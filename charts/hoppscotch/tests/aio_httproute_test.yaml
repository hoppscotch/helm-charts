suite: AIO HTTPRoute
templates:
  - aio/deployment.yaml
  - aio/httproute.yaml
  - config/configmap.yaml
  - config/secret.yaml
tests:
  - it: should generate HTTPRoute when deployment mode is aio and httpRoute is enabled
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: default
    asserts:
      - containsDocument:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
      - equal:
          path: metadata.name
          value: release-name-hoppscotch

  - it: should not generate HTTPRoute when deployment mode is aio and httpRoute is disabled
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate HTTPRoute when deployment mode is not aio
    template: aio/httproute.yaml
    set:
      deploymentMode: distributed
      aio:
        httpRoute:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should set parentRefs when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: default
              sectionName: https
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: default
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: should set hostnames when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          hostnames:
            - hoppscotch.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: hoppscotch.example.com

  - it: should set backendRefs to aio service
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          matches:
            - path:
                type: PathPrefix
                value: /
        service:
          ports:
            http: 3000
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: release-name-hoppscotch
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3000

  - it: should set default path match
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /

  - it: should set custom matches
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          matches:
            - path:
                type: Exact
                value: /api
              headers:
                - name: x-env
                  value: staging
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: Exact
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
      - equal:
          path: spec.rules[0].matches[0].headers[0].name
          value: x-env

  - it: should include annotations when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          annotations:
            example.com/custom: "true"
    asserts:
      - equal:
          path: metadata.annotations["example.com/custom"]
          value: "true"

  - it: should include common annotations
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      commonAnnotations:
        common-annotation: "value"
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
    asserts:
      - equal:
          path: metadata.annotations["common-annotation"]
          value: "value"
