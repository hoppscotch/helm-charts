suite: AIO HTTPRoute
templates:
  - aio/deployment.yaml
  - aio/httproute.yaml
  - config/configmap.yaml
  - config/secret.yaml
tests:
  - it: should generate HTTPRoute when deployment mode is aio and httpRoute is enabled
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: default
    asserts:
      - containsDocument:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
      - equal:
          path: metadata.name
          value: release-name-hoppscotch

  - it: should not generate HTTPRoute when deployment mode is aio and httpRoute is disabled
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not generate HTTPRoute when deployment mode is not aio
    template: aio/httproute.yaml
    set:
      deploymentMode: distributed
      aio:
        httpRoute:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should set parentRefs when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
              namespace: default
              sectionName: https
    asserts:
      - equal:
          path: spec.parentRefs[0].name
          value: my-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: default
      - equal:
          path: spec.parentRefs[0].sectionName
          value: https

  - it: should set hostnames when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          hostnames:
            - hoppscotch.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: hoppscotch.example.com

  - it: should create default rule when rules is empty
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
        service:
          ports:
            http: 3000
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: release-name-hoppscotch
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3000

  - it: should use custom rules when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /api
              backendRefs:
                - name: backend-svc
                  port: 3170
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: frontend-svc
                  port: 3000
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /api
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: backend-svc
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 3170
      - equal:
          path: spec.rules[1].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[1].backendRefs[0].name
          value: frontend-svc
      - equal:
          path: spec.rules[1].backendRefs[0].port
          value: 3000

  - it: should support traffic splitting with weights
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: stable
                  port: 80
                  weight: 90
                - name: canary
                  port: 80
                  weight: 10
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: stable
      - equal:
          path: spec.rules[0].backendRefs[0].weight
          value: 90
      - equal:
          path: spec.rules[0].backendRefs[1].name
          value: canary
      - equal:
          path: spec.rules[0].backendRefs[1].weight
          value: 10

  - it: should include annotations when specified
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
          annotations:
            example.com/custom: "true"
    asserts:
      - equal:
          path: metadata.annotations["example.com/custom"]
          value: "true"

  - it: should include common annotations
    template: aio/httproute.yaml
    set:
      deploymentMode: aio
      commonAnnotations:
        common-annotation: "value"
      aio:
        httpRoute:
          enabled: true
          parentRefs:
            - name: my-gateway
    asserts:
      - equal:
          path: metadata.annotations["common-annotation"]
          value: "value"
