# Global settings for the application
global:
  externalIP: "0.0.0.0" # Example: "192.168.1.1"
  namespace: "default" # Example: "hoppscotch"

# Enterprise-specific settings
enterprise:
  replicas: 1 # Example: 3
  image:
    repository: hoppscotch/hoppscotch-enterprise
    tag: latest # Example: "v1.0.0"
    pullPolicy: IfNotPresent
  # Main application resources (for deployment.yaml)
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"

  # Init containers configuration (used by both deployment and migration job)
  initContainers:
    # Resources for init containers (wait-for-postgres, etc.)
    resources:
      limits:
        cpu: "200m"
        memory: "256Mi"
      requests:
        cpu: "100m"
        memory: "128Mi"

  migration:
    upgradeEnabled: false # If true, the migration job will run on every helm upgrade
    # Resources for the migration job container
    resources:
      limits:
        cpu: "300m"
        memory: "256Mi"
      requests:
        cpu: "150m"
        memory: "128Mi"

  config:
    database:
      external: false # Flag to use external DB, if false, it will use the internal postgresql created by the helm chart
      url: "postgres://user:password@hostname:port/database?sslmode=require"
    postgresql:
      image: postgres:15
      persistence:
        size: 8Gi
      database: hoppscotchEnterprise
      username: hoppscotch
      password: hoppscotch123
      resources:
        requests:
          cpu: "1"
          memory: "1Gi"
        limits:
          cpu: "1"
          memory: "2Gi"

    affinityEnabled: false
    nodeHostnames: "node-1,node-2" # Example: "node-3,node-4"

    horizontalScaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80

    redis:
      external: false
      url: "redis://username:password@hostname:port/database"
      redis:
        image: redis:6.2
        password: redispassword
        persistence:
          size: 5Gi

    # 32-character key for encrypting sensitive data stored in the database
    dataEncryptionKey: "data encryption key with 32 char"

    # If true, the client's IP is read from the left-most entry of X-Forwarded-For
    trustProxy: false

    proxy:
      # Enable a local proxy server for routing API requests (requires subpath access)
      localProxyServerEnable: false
      # Default proxy URL offered to clients when proxying is enabled
      appUrl: "https://proxy.hoppscotch.io"
      # Access token for the proxy server (leave empty if not required)
      proxyscotchAccessToken: ""

    urls:
      base: "http://frontend.example.com"
      shortcode: "http://frontend.example.com"
      admin: "http://admin.example.com"
      backend:
        gql: "http://backend.example.com/graphql"
        ws: "ws://backend.example.com/graphql"
        api: "http://backend.example.com/v1"
      whitelistedOrigins: "http://backend.example.com,http://frontend.example.com,http://admin.example.com"

    clickhouse:
      # Deploy a bundled ClickHouse for audit logs / workspace activity logs.
      # The connection is configured from the admin dashboard. Enterprise Edition required.
      enabled: false
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        username: default
        password: "password"
        persistence:
          size: 10Gi

    enterprise:
      licenseKey: "dummyLicenseKey"
      enableSubpathBasedAccess: false

    links:
      tos: "https://docs.example.com/terms"
      privacyPolicy: "https://docs.example.com/privacy"

# ServiceAccount configuration
serviceAccount:
  # Name of the ServiceAccount; if not set, defaults to "{{ .Release.Name }}-sa"
  name: ""
  # Annotations for the ServiceAccount (e.g., for AWS IRSA)
  annotations: {}
  # Example for AWS IRSA:
  # eks.amazonaws.com/role-arn: "arn:aws:iam::${aws_account_id}:role/devops-${stage}-hoppscotch"

# Service configuration
service:
  apiVersion: v1
  name: hoppscotch-enterprise
  app: hoppscotch-enterprise
  # Dynamically set based on ingress
  type: '{{ .Values.service.ingress.enabled | ternary "ClusterIP" "LoadBalancer" }}'
  # Only set externalTrafficPolicy for LoadBalancer
  externalTrafficPolicy: '{{ .Values.service.ingress.enabled | ternary "" "Cluster" }}'

  ports:
    backend:
      port: 3170
      targetPort: 3170
      protocol: TCP
      name: backend
    frontend:
      port: 3000
      targetPort: 3000
      protocol: TCP
      name: frontend
    admin:
      port: 3100
      targetPort: 3100
      protocol: TCP
      name: admin
    subpath:
      port: 80
      targetPort: 80
      protocol: TCP
      name: subpath
  selector:
    app: hoppscotch-enterprise

  # Ingress Configuration
  ingress:
    enabled: true
    mainHost: frontend.example.com
    adminHost: admin.example.com
    backendHost: backend.example.com
    className: nginx # nginx, alb, traefik
    annotations:
      # Example for NGINX Ingress:
      nginx.ingress.kubernetes.io/rewrite-target: /
      # Example AWS ALB internal configuration:
      # alb.ingress.kubernetes.io/scheme: "internal"
      # alb.ingress.kubernetes.io/security-groups: "sg-12345678"
      # alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:region:account-id:certificate/cert-id"

  annotations: # Define service annotations here if needed. For example, to configure a load balancer:
    example.com/dummy: ""
    # service.kubernetes.io/load-balancer-type: "External"

    # Remove the empty braces ({}) and add your annotations as key-value pairs.

  # TLS Configuration
  tls:
    enabled: false
    secretName: hoppscotch-tls
