apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-enterprise-secrets
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
type: Opaque
data:
  # Enterprise License
  ENTERPRISE_LICENSE_KEY: {{ .Values.enterprise.config.enterprise.licenseKey | b64enc | quote }}

  # Database
  DATABASE_URL: {{ if .Values.enterprise.config.database.external }}{{ .Values.enterprise.config.database.url | b64enc | quote }}{{ else }}{{ printf "postgresql://%s:%s@%s-postgresql:5432/%s?schema=public" .Values.enterprise.config.postgresql.username .Values.enterprise.config.postgresql.password .Release.Name .Values.enterprise.config.postgresql.database | b64enc | quote }}{{ end }}

  # Data Encryption
  DATA_ENCRYPTION_KEY: {{ .Values.enterprise.config.dataEncryptionKey | b64enc | quote }}

  # Horizontal Scaling (Redis required only when enabled)
  {{- if .Values.enterprise.config.horizontalScaling.enabled }}
  REDIS_URL: {{ if .Values.enterprise.config.redis.external }}{{ .Values.enterprise.config.redis.url | b64enc | quote }}{{ else }}{{ printf "redis://%s-redis:6379/0" .Release.Name | b64enc | quote }}{{ end }}
  {{- end }}
